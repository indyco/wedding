<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -22 240 218" fill="none">
  <defs>
    <linearGradient id="flameGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#b5631f"/>
      <stop offset="45%" stop-color="#e6a83f"/>
      <stop offset="100%" stop-color="#f8ecb0"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#e9a23c"/>
      <stop offset="100%" stop-color="#fffaf0"/>
    </linearGradient>
    <linearGradient id="ironGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a3d31"/>
      <stop offset="100%" stop-color="#1c1611"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#ffdf8e" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#e9a23c" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#e9a23c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ghostGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9fd9b0" stop-opacity="0.22"/>
      <stop offset="70%" stop-color="#6fae8e" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#6fae8e" stop-opacity="0"/>
    </radialGradient>
    <filter id="blurGlow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3.2"/></filter>
    <filter id="blurSmoke" x="-100%" y="-50%" width="300%" height="220%"><feGaussianBlur stdDeviation="1.1"/></filter>
  </defs>

  <style>
    .flame { transform-box: fill-box; transform-origin: 50% 100%; animation: flick 1.7s ease-in-out infinite; }
    .sway  { transform-box: fill-box; transform-origin: 50% 100%; animation: sway 3.6s ease-in-out infinite; }
    .glow  { transform-box: fill-box; transform-origin: 50% 50%;  animation: glowpulse 2.8s ease-in-out infinite; }
    .ghost { transform-box: fill-box; transform-origin: 50% 60%;  animation: glowpulse 6.5s ease-in-out infinite; }
    .smoke { transform-box: fill-box; transform-origin: 50% 100%; animation: rise 5.5s linear infinite; opacity: 0; }

    .f1 { animation-duration: 1.5s; }
    .f2 { animation-duration: 1.9s; animation-delay: -0.4s; }
    .f3 { animation-duration: 1.3s; animation-delay: -0.8s; }
    .f4 { animation-duration: 2.1s; animation-delay: -0.2s; }
    .f5 { animation-duration: 1.7s; animation-delay: -1.0s; }
    .s1 { animation-duration: 3.2s; }
    .s2 { animation-duration: 3.9s; animation-delay: -0.6s; }
    .s3 { animation-duration: 2.9s; animation-delay: -1.2s; }
    .s4 { animation-duration: 4.1s; animation-delay: -0.3s; }
    .s5 { animation-duration: 3.5s; animation-delay: -0.9s; }
    .g1 { animation-duration: 2.6s; }
    .g2 { animation-duration: 3.1s; animation-delay: -0.5s; }
    .g3 { animation-duration: 2.3s; animation-delay: -1.0s; }
    .g4 { animation-duration: 3.4s; animation-delay: -0.2s; }
    .g5 { animation-duration: 2.8s; animation-delay: -0.7s; }
    .m1 { animation-delay: -0.5s; } .m2 { animation-delay: -2.0s; } .m3 { animation-delay: -3.5s; }
    .m4 { animation-delay: -1.2s; } .m5 { animation-delay: -2.8s; }

    @keyframes flick {
      0%, 100% { opacity: 0.92; transform: scaleY(1) scaleX(1); }
      20% { opacity: 0.78; transform: scaleY(0.93) scaleX(1.04); }
      45% { opacity: 1; transform: scaleY(1.09) scaleX(0.96); }
      70% { opacity: 0.84; transform: scaleY(0.98) scaleX(1.02); }
    }
    @keyframes sway {
      0%, 100% { transform: rotate(0deg); }
      35% { transform: rotate(2.2deg); }
      65% { transform: rotate(-1.6deg); }
    }
    @keyframes glowpulse {
      0%, 100% { opacity: 0.45; transform: scale(1); }
      50% { opacity: 0.82; transform: scale(1.14); }
    }
    @keyframes rise {
      0% { opacity: 0; transform: translateY(2px) translateX(0) scale(0.7); }
      12% { opacity: 0.45; }
      55% { opacity: 0.2; }
      100% { opacity: 0; transform: translateY(-20px) translateX(4px) scale(1.25); }
    }
    @media (prefers-reduced-motion: reduce) {
      .flame, .sway, .glow, .ghost, .smoke { animation: none; }
      .smoke { opacity: 0; }
    }
  </style>

  <!-- ghostly halo -->
  <ellipse class="ghost" cx="120" cy="42" rx="74" ry="48" fill="url(#ghostGrad)" filter="url(#blurGlow)"/>

  <!-- base -->
  <ellipse cx="120" cy="179" rx="34" ry="5" fill="#15100c"/>
  <path d="M96 174 q24 -13 48 0 q-9 8 -24 8 q-15 0 -24 -8 z" fill="url(#ironGrad)" stroke="#c2a14d" stroke-width="1.5"/>

  <!-- wrought-iron frame (dark underlay) -->
  <g fill="none" stroke="#15100c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M120 178 V78"/>
    <path d="M120 118 C 107 110, 99 100, 92 92"/>
    <path d="M120 118 C 133 110, 141 100, 148 92"/>
    <path d="M120 126 C 99 124, 77 116, 64 104"/>
    <path d="M120 126 C 141 124, 163 116, 176 104"/>
  </g>
  <!-- wrought-iron frame (brass highlight) -->
  <g fill="none" stroke="#c2a14d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M120 178 V78"/>
    <path d="M120 118 C 107 110, 99 100, 92 92"/>
    <path d="M120 118 C 133 110, 141 100, 148 92"/>
    <path d="M120 126 C 99 124, 77 116, 64 104"/>
    <path d="M120 126 C 141 124, 163 116, 176 104"/>
  </g>

  <!-- bobeche cups -->
  <g fill="#1c1611" stroke="#c2a14d" stroke-width="1.5">
    <ellipse cx="120" cy="78" rx="10" ry="3"/>
    <ellipse cx="92" cy="90" rx="8" ry="2.6"/>
    <ellipse cx="148" cy="90" rx="8" ry="2.6"/>
    <ellipse cx="64" cy="102" rx="7" ry="2.5"/>
    <ellipse cx="176" cy="102" rx="7" ry="2.5"/>
  </g>
  <!-- knops -->
  <g fill="#c2a14d">
    <circle cx="120" cy="150" r="4.5"/>
    <circle cx="120" cy="120" r="6"/>
    <circle cx="120" cy="96" r="4"/>
  </g>

  <!-- candles -->
  <g fill="#e7dcc6" stroke="#9c7f3a" stroke-width="1">
    <path d="M113 78 L114 48 Q120 46 126 48 L127 78 Z"/>
    <path d="M86 90 L87 62 Q92 60 97 62 L98 90 Z"/>
    <path d="M142 90 L143 62 Q148 60 153 62 L154 90 Z"/>
    <path d="M59 102 L60 78 Q64 76 68 78 L69 102 Z"/>
    <path d="M171 102 L172 78 Q176 76 180 78 L181 102 Z"/>
  </g>
  <!-- dripping wax -->
  <g fill="#efe6d2">
    <path d="M114 58 q-4 8 -1 13 q4 -3 4 -8 z"/>
    <path d="M126 64 q4 7 1 12 q-4 -3 -4 -8 z"/>
    <path d="M87 70 q-3 6 -1 10 q3 -2 3 -6 z"/>
    <path d="M153 70 q3 6 1 10 q-3 -2 -3 -6 z"/>
  </g>
  <!-- wicks -->
  <g stroke="#2a2018" stroke-width="1.4" stroke-linecap="round">
    <path d="M120 48 v-3"/>
    <path d="M92 62 v-3"/>
    <path d="M148 62 v-3"/>
    <path d="M64 78 v-3"/>
    <path d="M176 78 v-3"/>
  </g>

  <!-- flame glows -->
  <g filter="url(#blurGlow)">
    <ellipse class="glow g3" cx="120" cy="34" rx="16" ry="22" fill="url(#glowGrad)"/>
    <ellipse class="glow g1" cx="92" cy="50" rx="13" ry="17" fill="url(#glowGrad)"/>
    <ellipse class="glow g2" cx="148" cy="50" rx="13" ry="17" fill="url(#glowGrad)"/>
    <ellipse class="glow g4" cx="64" cy="66" rx="11" ry="15" fill="url(#glowGrad)"/>
    <ellipse class="glow g5" cx="176" cy="66" rx="11" ry="15" fill="url(#glowGrad)"/>
  </g>

  <!-- flames (sway wrapper + flicker inner) -->
  <g class="sway s3"><g class="flame f3">
    <path d="M120 48 C 113 40, 114 30, 120 22 C 126 30, 127 40, 120 48 Z" fill="url(#flameGrad)"/>
    <path d="M120 47 C 116 42, 117 35, 120 30 C 123 35, 124 42, 120 47 Z" fill="url(#coreGrad)"/>
  </g></g>
  <g class="sway s1"><g class="flame f1">
    <path d="M92 62 C 86 55, 87 46, 92 40 C 97 46, 98 55, 92 62 Z" fill="url(#flameGrad)"/>
    <path d="M92 61 C 89 56, 90 50, 92 46 C 94 50, 95 56, 92 61 Z" fill="url(#coreGrad)"/>
  </g></g>
  <g class="sway s2"><g class="flame f2">
    <path d="M148 62 C 142 55, 143 46, 148 40 C 153 46, 154 55, 148 62 Z" fill="url(#flameGrad)"/>
    <path d="M148 61 C 145 56, 146 50, 148 46 C 150 50, 151 56, 148 61 Z" fill="url(#coreGrad)"/>
  </g></g>
  <g class="sway s4"><g class="flame f4">
    <path d="M64 78 C 59 72, 60 63, 64 58 C 68 63, 69 72, 64 78 Z" fill="url(#flameGrad)"/>
    <path d="M64 77 C 61 73, 62 67, 64 63 C 66 67, 67 73, 64 77 Z" fill="url(#coreGrad)"/>
  </g></g>
  <g class="sway s5"><g class="flame f5">
    <path d="M176 78 C 171 72, 172 63, 176 58 C 180 63, 181 72, 176 78 Z" fill="url(#flameGrad)"/>
    <path d="M176 77 C 173 73, 174 67, 176 63 C 178 67, 179 73, 176 77 Z" fill="url(#coreGrad)"/>
  </g></g>

  <!-- smoke wisps -->
  <g fill="none" stroke="#cfc4b0" stroke-width="1.6" stroke-linecap="round" filter="url(#blurSmoke)">
    <path class="smoke m3" d="M120 22 q-6 -8 0 -15 q6 -7 0 -14"/>
    <path class="smoke m1" d="M92 40 q-5 -7 0 -13 q5 -6 0 -11"/>
    <path class="smoke m2" d="M148 40 q5 -7 0 -13 q-5 -6 0 -11"/>
    <path class="smoke m4" d="M64 58 q-4 -6 0 -11 q4 -5 0 -9"/>
    <path class="smoke m5" d="M176 58 q4 -6 0 -11 q-4 -5 0 -9"/>
  </g>
</svg>
